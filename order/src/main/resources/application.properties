spring.application.name=order
spring.profiles.active=dev
server.port=8083
spring.datasource.url=jdbc:mysql://mysql-container:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=app
spring.datasource.password=app123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=update
management.endpoints.web.exposure.include=*


# kafka application.properties (order)
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

management.endpoint.prometheus.enabled=true