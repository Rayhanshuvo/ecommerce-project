name: Notification Service CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'notification/**'    # only runs when notification folder changes

jobs:
  build-push-deploy:
    name: Build → Push → Deploy
    runs-on: self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        working-directory: notification
        run: mvn clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t rayhan1994/notification:latest ./notification

      - name: Push to DockerHub
        run: docker push rayhan1994/notification:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/mysql-deployment.yml
          kubectl apply -f k8s/kafka-deployment.yml
          kubectl apply -f k8s/prometheus-deployment.yml
          kubectl apply -f k8s/grafana-deployment.yml
          kubectl apply -f k8s/notification-deployment.yml
          kubectl rollout restart deployment/notification -n ecommerce
          kubectl rollout status deployment/notification -n ecommerce

      - name: Verify
        run: kubectl get pods -n ecommerce -l app=notification