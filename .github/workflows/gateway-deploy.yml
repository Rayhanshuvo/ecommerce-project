name: API Gateway CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'api-gateway/**'

jobs:
  build-push-deploy:
    name: Build → Push → Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        working-directory: api-gateway
        run: mvn clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t rayhan1994/api-gateway:latest ./api-gateway

      - name: Push to DockerHub
        run: docker push rayhan1994/api-gateway:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/gateway-deployment.yml
          kubectl rollout restart deployment/api-gateway -n ecommerce
          kubectl rollout status deployment/api-gateway -n ecommerce

      - name: Verify
        run: kubectl get pods -n ecommerce -l app=api-gateway