name: Order Service CI/CD

on:
  push:
    branches:
      - master
    paths:
      - 'order/**'

jobs:
  build-push-deploy:
    name: Build → Push → Deploy
    runs-on: self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        working-directory: order
        run: mvn clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t rayhan1994/order:latest ./order

      - name: Push to DockerHub
        run: docker push rayhan1994/order:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/order-deployment.yml
          kubectl rollout restart deployment/order -n ecommerce
          kubectl rollout status deployment/order -n ecommerce

      - name: Verify
        run: kubectl get pods -n ecommerce -l app=order