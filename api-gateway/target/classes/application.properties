spring.application.name=api-gateway
server.port=8085

spring.cloud.gateway.routes[0].id=order-service
spring.cloud.gateway.routes[0].uri=http://order:8083
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[1].id=notification-service
spring.cloud.gateway.routes[1].uri=http://notification:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/notifications/**

management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true